# Install dependencies with uv, lint/type-check, and run the test suite across
# the supported Python versions.
name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  Lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
    - name: Install dependencies
      run: uv sync --locked
    - name: Lint with ruff
      run: uv run ruff check pqdict tests
    - name: Static type check library with mypy
      run: uv run mypy pqdict
    - name: Static type check library with pyright
      run: uv run pyright pqdict
    - name: Static type check library and test suite with ty
      run: uv run ty check pqdict tests

  Test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.13t", "3.14", "3.14t"]
    env:
      # Pin the interpreter for both `uv sync` and `uv run` so free-threaded
      # builds (3.13t/3.14t) aren't silently swapped for the GIL build.
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
    - name: Run tests
      run: uv run --locked --no-default-groups --group test pytest
