# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-lts-latest
  tools:
    python: "3"

# Build documentation in the docs/ directory with Sphinx
sphinx:
   configuration: docs/conf.py

# If using Sphinx, optionally build your docs in additional formats such as PDF
# formats:
#    - pdf

# Install the package and its PEP 735 "docs" dependency group via uv.
# (extra_requirements is for [project.optional-dependencies] extras; dependency
# groups are only installable through the uv method with command: sync, which
# also respects the committed uv.lock.)
python:
  install:
    - method: uv
      command: sync
      groups:
        - docs